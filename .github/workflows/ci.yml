name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun run test

  pack-smoke:
    name: pack smoke (publishable packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `npm pack --dry-run` resolves each package's `files`/`exports` and
      # fails if a published tarball would be missing or malformed — a cheap
      # guard that the closed `exports` surface (R13) still packs cleanly.
      - name: Pack each publishable package
        run: |
          set -euo pipefail
          for dir in packages/core plugins/*; do
            if [ -f "$dir/package.json" ]; then
              echo "::group::pack $dir"
              ( cd "$dir" && npm pack --dry-run )
              echo "::endgroup::"
            fi
          done
