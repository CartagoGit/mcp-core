# codeql.yml — f00050 S8.
#
# CodeQL static analysis on push and pull_request targeting `main`.
# Uses the `security-and-quality` query pack so we get both
#   - security vulns (SQLi, command injection, path traversal, SSRF…)
#   - quality / maintainability rules (duplicated code, dead code…)
# on the same run. The `bun` autogen step is excluded so the scanner
# only sees first-party TypeScript.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: typescript
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
