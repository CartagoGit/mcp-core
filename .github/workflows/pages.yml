name: Pages

# Builds and deploys the documentation site to GitHub Pages on every push to
# main. The site (apps/web) is generated from the LIVE tool registry in --strict
# mode, so an undocumented tool fails the build and the web can never silently
# drift behind the code.
#
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure Pages
        uses: actions/configure-pages@v6

      # The site imports the public API, which resolves to dist/.
      - name: Build dist
        run: bun run build

      - name: Generate site (strict — fails on an undocumented tool)
        env:
          ASTRO_TELEMETRY_DISABLED: '1'
        run: bun run site:strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        # Astro emits the static site to `build/apps/web/` (see AGENTS.md
        # → "Build / dist layout"). The old `apps/web/dist/` path is no
        # longer the source of truth.
        with:
          path: build/apps/web

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
