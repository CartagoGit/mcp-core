# Lefthook — git hooks for @mcp-vertex/core
# Docs: https://lefthook.dev/configuration/
#
# Install: `bun install` runs `prepare` → `lefthook install` automatically.
# Skip with `LEFTHOOK=0 git commit ...` or `git commit --no-verify`.
#
# Policy: hooks WARN but never BLOCK commit/push.
# Lefthook 2.x has no native `run_type: warning` option, so every command
# that should be advisory is wrapped with `|| true`. The command's own
# output (including errors) is still printed, so violations are visible
# and `bun run validate` / CI are still the source of truth.

min_version: 1.7.0
no_tty: false
colors: true

pre-commit:
  parallel: true
  commands:
    # Format the front surface for staged files only — surgical, fast.
    # Runs Biome in write mode but only touches staged paths. Advisory:
    # if Biome ever fails on an exotic file, the commit still goes
    # through and CI / `bun run validate` catches it.
    format-web-staged:
      glob_filter:
        items:
          - "apps/web/src/**/*.{astro,ts,tsx,js,jsx,mjs,cjs,vue,svelte,scss,css,html,json,md,mdx}"
          - "apps/web/scripts/**/*.{ts,mjs,cjs,json}"
          - "apps/web/astro.config.mjs"
      run: bun x @biomejs/biome format --write --no-errors-on-unmatched {staged_files} || true
      stage_fixed: true

    # Also lint/format the rest of the monorepo for any non-front staged files.
    # (Biome ci already runs in `bun run lint`, but this catches formatting
    # issues at commit time instead of waiting for CI.) Advisory, see above.
    format-other-staged:
      glob_filter:
        exclude:
          - "apps/web/src/**"
          - "apps/web/scripts/**"
          - "apps/web/astro.config.mjs"
      run: bun x @biomejs/biome format --write --no-errors-on-unmatched {staged_files} || true
      stage_fixed: true

    # Validate BEM + nested SCSS rules on staged SCSS files. Advisory:
    # violations are printed but do NOT block the commit; the same
    # check runs in `bun run validate` and CI.
    # Skips silently when no SCSS files are staged.
    lint-scss-staged:
      glob_filter:
        items:
          - "apps/web/src/**/*.scss"
      run: bun run lint:scss || true
      stage_fixed: false

    catalog-drift-check:
      glob_filter:
        items:
          - "packages/core/skills/manifest.json"
          - "docs/mcp-vertex/proposals/index.json"
          - "packages/core/src/generated/tool-outputs.ts"
          - "docs/mcp-vertex/agent-catalog.generated.json"
      run: bun run catalog:check || true
      stage_fixed: false

    host-hints-drift-check:
      glob_filter:
        items:
          - "docs/mcp-vertex/agent-catalog.generated.json"
          - "tools/scripts/catalog/render-host-hints.script.ts"
          - "docs/mcp-vertex/host-hints/copilot-instructions.generated.md"
          - "docs/mcp-vertex/host-hints/claude.generated.md"
          - "docs/mcp-vertex/host-hints/agents.generated.md"
      run: bun run catalog:hints:check || true
      stage_fixed: false

    # f00082: catch stray executable files at the repo root and under
    # .cache/mcp-vertex/ before they sneak in. Advisory like the
    # other drift checks — `bun run validate` is the source of truth
    # and will fail the CI run. The hook is here so the agent
    # authoring the commit sees the violation immediately.
    stray-files-check:
      run: bun run lint:stray-cache-files || true

pre-push:
  parallel: false
  commands:
    # Full-repo format check before pushing. Advisory: prints the
    # unformatted files but never blocks the push.
    format-check-all:
      run: bun run format:all:check || true
    format-check-web:
      run: bun run format:web:check || true
    # Full-site SCSS BEM lint (matches what `bun run validate` runs in CI).
    # Advisory: prints violations but does not block the push.
    lint-scss-all:
      run: bun run lint:scss || true

# Manual hooks (run with `lefthook run <name>`).
format_web:
  commands:
    format-web:
      run: bun run format:web
